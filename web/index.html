<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Marées</title>
<meta name="theme-color" content="#04264c" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Marées" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" href="icon-180.png" />
<link rel="manifest" href="manifest.webmanifest" />
<style>
  :root {
    --top: #0a6ab0; --bottom: #04264c;
    --high: #66d9ff; --low: #fbe6b4;
    --card: rgba(255,255,255,.10); --stroke: rgba(255,255,255,.14);
    --txt: #fff; --faint: rgba(255,255,255,.75); --fainter: rgba(255,255,255,.5);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { margin: 0; background: var(--bottom); }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    color: var(--txt);
    background: linear-gradient(180deg, var(--top), var(--bottom) 70%, var(--bottom));
    min-height: 100dvh;
    padding: max(16px, env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  .wrap { max-width: 640px; margin: 0 auto; }

  header { display: flex; align-items: center; justify-content: space-between; margin: 4px 4px 18px; }
  h1 { font-size: 34px; font-weight: 800; letter-spacing: -.02em; margin: 0; }
  .port-btn {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 4px;
    background: none; border: 0; color: var(--faint); font-size: 15px; font-weight: 500;
    font-family: inherit; padding: 4px 0; cursor: pointer; transition: opacity .2s, transform .1s;
  }
  .port-btn:active { transform: scale(.96); opacity: .7; }
  .port-btn svg { width: 15px; height: 15px; }
  .hright { display: flex; align-items: center; gap: 10px; }
  .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px;
    color: #fff; background: rgba(255,255,255,.12); border: 1px solid var(--stroke); border-radius: 50%;
    cursor: pointer; transition: transform .1s, background .15s; }
  .icon-btn:active { transform: scale(.9); background: rgba(255,255,255,.22); }
  .icon-btn svg { width: 19px; height: 19px; }
  #chartHost { position: relative; touch-action: pan-y; }
  #scrubTip { position: absolute; top: -2px; transform: translateX(-50%); display: none; z-index: 2;
    background: rgba(8,34,60,.92); border: 1px solid rgba(255,255,255,.18); color: #fff;
    font-size: 12px; font-weight: 600; padding: 5px 10px; border-radius: 10px; white-space: nowrap;
    pointer-events: none; backdrop-filter: blur(8px); box-shadow: 0 6px 18px rgba(0,0,0,.25); }
  #scrubTip b { font-weight: 800; }
  .spinner { width: 22px; height: 22px; border: 2.5px solid rgba(255,255,255,.25);
    border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .card {
    position: relative; overflow: hidden;
    background: var(--card); border: 1px solid var(--stroke);
    border-radius: 28px; padding: 20px; margin-bottom: 16px;
    backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%);
    box-shadow: 0 14px 40px rgba(0,0,0,.18);
  }
  .card > * { position: relative; z-index: 1; }
  .hero { background: linear-gradient(160deg, rgba(102,217,255,.24), rgba(10,106,176,.30)); }

  /* Entrée animée (staggered) */
  .enter { opacity: 0; animation: riseIn .7s cubic-bezier(.2,.7,.2,1) forwards; animation-delay: var(--d, 0s); }
  @keyframes riseIn { from { opacity: 0; transform: translateY(18px) scale(.985); } to { opacity: 1; transform: none; } }

  /* Eau vivante dans la carte héro */
  .water { position: absolute; left: 0; right: 0; bottom: 0; height: 0;
    background: linear-gradient(180deg, rgba(102,217,255,.30), rgba(10,106,176,.32));
    transition: height 1.6s cubic-bezier(.3,.8,.3,1); z-index: 0; pointer-events: none; }
  .crest { position: absolute; top: -13px; left: 0; width: 200%; height: 16px; }
  .crest svg { position: absolute; top: 0; left: 0; width: 50%; height: 100%; }
  .crest .w1 { fill: rgba(102,217,255,.32); animation: waveX 8s linear infinite; }
  .crest .w2 { fill: rgba(143,227,255,.20); animation: waveX 13s linear infinite reverse; opacity: .8; }
  @keyframes waveX { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  .trend { font-size: 15px; font-weight: 600; color: var(--faint); display: flex; align-items: center; gap: 6px; }
  .trend .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--high); box-shadow: 0 0 0 0 rgba(102,217,255,.6); animation: ping 2s ease-out infinite; }
  @keyframes ping { 0% { box-shadow: 0 0 0 0 rgba(102,217,255,.55); } 70%,100% { box-shadow: 0 0 0 9px rgba(102,217,255,0); } }
  .now-row { display: flex; align-items: flex-end; justify-content: space-between; margin-top: 10px; }
  .height { font-size: 64px; font-weight: 800; letter-spacing: -.03em; line-height: 1; font-variant-numeric: tabular-nums; }
  .height small { font-size: 24px; font-weight: 600; color: var(--faint); }
  .coef { text-align: center; min-width: 78px; }
  .coef b { display: block; font-size: 30px; font-weight: 800; line-height: 1; }
  .coef .moon { font-size: 18px; }
  .coef span { font-size: 11px; color: var(--faint); display: block; margin-top: 2px; }

  .progress { height: 5px; border-radius: 3px; background: rgba(255,255,255,.16); overflow: hidden; margin: 16px 0 4px; }
  .progress i { display: block; height: 100%; border-radius: 3px; width: 0;
    background: linear-gradient(90deg, var(--low), var(--high)); transition: width 1s linear; }
  .prog-lbl { display: flex; justify-content: space-between; font-size: 11px; color: var(--fainter); }

  .divider { height: 1px; background: rgba(255,255,255,.18); margin: 16px 0; }
  .next { display: flex; align-items: center; gap: 12px; }
  .next .ic { width: 34px; height: 34px; flex: 0 0 34px; }
  .next .lbl { font-size: 13px; color: var(--faint); }
  .next .val { font-size: 17px; font-weight: 700; }
  .pill { margin-left: auto; background: rgba(255,255,255,.18); border-radius: 999px;
    padding: 6px 12px; font-size: 14px; font-weight: 600; white-space: nowrap; font-variant-numeric: tabular-nums; }

  .card h2 { font-size: 17px; font-weight: 700; margin: 0 0 12px; }
  .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .tile { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.08);
    border-radius: 18px; padding: 12px 10px; text-align: center; }
  .tile .ti { font-size: 20px; line-height: 1; }
  .tile .tv { font-size: 22px; font-weight: 800; margin-top: 6px; font-variant-numeric: tabular-nums; letter-spacing: -.01em; }
  .tile .tv small { font-size: 12px; font-weight: 600; color: var(--faint); }
  .tile .tl { font-size: 11px; color: var(--fainter); margin-top: 2px; }
  @media (max-width: 360px) { .tiles { grid-template-columns: repeat(2, 1fr); } }
  .act { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
  .act + .act { border-top: 1px solid rgba(255,255,255,.08); }
  .aico { font-size: 22px; width: 30px; text-align: center; flex: 0 0 30px; }
  .amain { flex: 1; min-width: 0; }
  .an { font-size: 15px; font-weight: 600; }
  .as { font-size: 12px; color: var(--faint); margin-top: 1px; }
  .abadge { font-size: 11px; font-weight: 700; padding: 5px 10px; border-radius: 999px; white-space: nowrap; text-align: center; }
  .q1 { background: rgba(255,255,255,.1); color: var(--faint); }
  .q2 { background: rgba(251,230,180,.16); color: #fbe6b4; }
  .q3 { background: rgba(102,217,255,.16); color: #bdefff; }
  .q4 { background: rgba(90,230,160,.18); color: #8ef0c0; }
  .offline { background: rgba(251,191,90,.16); border: 1px solid rgba(251,191,90,.3); color: #ffdca0;
    font-size: 13px; font-weight: 600; text-align: center; padding: 10px 14px; border-radius: 16px; margin-bottom: 14px; }

  /* Ruban de jours */
  .ribbon { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 12px; margin: -2px 0 4px;
    scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .ribbon::-webkit-scrollbar { display: none; }
  .pill-day { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 6px; padding: 8px 13px;
    border-radius: 14px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1);
    color: var(--faint); font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap;
    cursor: pointer; transition: transform .1s, background .15s; }
  .pill-day:active { transform: scale(.94); }
  .pill-day.sel { background: var(--high); color: #04264c; border-color: transparent; }
  .rk { width: 6px; height: 6px; border-radius: 50%; }
  .rk-red { background: #ff5a5a; } .rk-amber { background: #ffb84d; }
  .pill-day.sel .rk-red { background: #c00; } .pill-day.sel .rk-amber { background: #b56a00; }

  /* Bandeau météo du jour sélectionné */
  .daystrip { display: flex; flex-wrap: wrap; gap: 8px 12px; align-items: center; margin-top: 12px;
    font-size: 14px; font-weight: 600; color: var(--txt); }
  .daystrip small { font-size: 12px; font-weight: 500; color: var(--faint); }
  .daystrip .sep { opacity: .35; }

  /* Alertes sécurité */
  .alert { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 18px; margin-bottom: 14px; }
  .alert .ai { font-size: 22px; line-height: 1; }
  .alert b { display: block; font-size: 14px; }
  .alert span { font-size: 12px; opacity: .85; }
  .alert-red { background: rgba(255,90,90,.16); border: 1px solid rgba(255,90,90,.36); color: #ffd4d4; }
  .alert-amber { background: rgba(255,184,77,.16); border: 1px solid rgba(255,184,77,.34); color: #ffe6bf; }
  .row { display: flex; align-items: center; gap: 12px; padding: 7px 0; transition: opacity .4s; }
  .row .ic { width: 22px; height: 22px; flex: 0 0 22px; }
  .row .type { font-size: 15px; color: var(--faint); }
  .row .rcoef { margin-left: auto; font-size: 12px; font-weight: 600; color: var(--faint);
    background: rgba(255,255,255,.12); border-radius: 999px; padding: 3px 8px; }
  .row .h { width: 66px; text-align: right; font-size: 15px; color: var(--faint); font-variant-numeric: tabular-nums; }
  .row .t { width: 52px; text-align: right; font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .row.past { opacity: .4; }
  .row.nextup { background: rgba(102,217,255,.10); border-radius: 12px; margin: 0 -8px; padding: 7px 8px; }
  .daygroup + .daygroup { border-top: 1px solid rgba(255,255,255,.12); margin-top: 8px; padding-top: 8px; }
  .dayname { font-size: 14px; font-weight: 600; color: var(--faint); margin: 4px 0; }

  svg.chart { width: 100%; height: 210px; display: block; }
  .draw { stroke-dasharray: 1; stroke-dashoffset: 1; animation: draw 1.6s cubic-bezier(.4,0,.2,1) forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  .fadein { opacity: 0; animation: fadeArea 1.2s .5s forwards; }
  @keyframes fadeArea { to { opacity: 1; } }
  #nowPulse { animation: nowPulse 2.2s ease-out infinite; transform-origin: center; transform-box: fill-box; }
  @keyframes nowPulse { 0% { r: 5; opacity: .55; } 70%,100% { r: 15; opacity: 0; } }

  /* Skeleton de chargement */
  .sk { background: rgba(255,255,255,.08); border-radius: 12px; overflow: hidden; position: relative; }
  .sk::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%);
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.14), transparent); animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 100% { transform: translateX(100%); } }

  .sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(6px);
    display: none; align-items: flex-end; z-index: 20; }
  .sheet-bg.open { display: flex; animation: bgFade .25s ease; }
  @keyframes bgFade { from { opacity: 0; } to { opacity: 1; } }
  .sheet { background: #0b3358; width: 100%; max-height: 82dvh; border-radius: 24px 24px 0 0;
    padding: 14px 16px calc(20px + env(safe-area-inset-bottom)); overflow-y: auto;
    box-shadow: 0 -10px 40px rgba(0,0,0,.4); animation: sheetUp .32s cubic-bezier(.2,.8,.2,1); }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: none; } }
  .sheet .grab { width: 40px; height: 5px; background: rgba(255,255,255,.3); border-radius: 3px; margin: 4px auto 12px; }
  .search-in { width: 100%; font-size: 17px; font-family: inherit; color: #fff;
    background: rgba(255,255,255,.12); border: 1px solid var(--stroke); border-radius: 14px; padding: 12px 14px; outline: none; }
  .search-in::placeholder { color: var(--fainter); }
  .geo-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
    margin-top: 10px; padding: 12px; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--high);
    background: rgba(102,217,255,.12); border: 1px solid rgba(102,217,255,.22); border-radius: 14px; cursor: pointer; transition: transform .1s, background .15s; }
  .geo-btn:active { transform: scale(.98); background: rgba(102,217,255,.2); }
  .geo-btn svg { width: 18px; height: 18px; }
  .copyright { text-align: center; color: rgba(255,255,255,.3); font-size: 12px; letter-spacing: .02em; padding: 22px 0 6px; }
  .result { display: flex; align-items: center; gap: 12px; padding: 14px 6px; width: 100%;
    background: none; border: 0; border-bottom: 1px solid rgba(255,255,255,.08); color: #fff;
    font-family: inherit; font-size: 16px; text-align: left; cursor: pointer; transition: background .15s; }
  .result:active { background: rgba(255,255,255,.08); }
  .result small { display: block; color: var(--faint); font-size: 12px; }

  .state { text-align: center; color: var(--faint); padding: 60px 20px; }
  .state svg { width: 40px; height: 40px; margin-bottom: 12px; }
  .btn { font-family: inherit; font-size: 16px; font-weight: 600; color: #fff;
    background: rgba(255,255,255,.18); border: 0; border-radius: 14px; padding: 12px 20px; margin-top: 14px; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Marées</h1>
      <button class="port-btn" id="portBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.6-7-11a7 7 0 0 1 14 0c0 5.4-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
        <span id="portName">…</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:12px;height:12px"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>
    <div class="hright">
      <div id="headSpin"></div>
      <button class="icon-btn" id="shareBtn" aria-label="Partager l'image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3M8 7l4-4 4 4"/><path d="M5 12v7a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-7"/></svg>
      </button>
    </div>
  </header>
  <main id="content"></main>
  <footer class="copyright">© MineDigital</footer>
</div>

<div class="sheet-bg" id="sheetBg">
  <div class="sheet" id="sheet">
    <div class="grab"></div>
    <input class="search-in" id="searchIn" placeholder="Saint-Malo, Brest, La Rochelle…" autocomplete="off" />
    <button class="geo-btn" id="geoBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      Utiliser ma position
    </button>
    <div id="results"></div>
  </div>
</div>

<script>
const API_BASE = (window.MAREE_API_BASE ?? "/api");
const DEFAULT_PORT = { id: 17, nom: "Saint-Malo", lat: 48.6539, lon: -2.01563, time_zone: "Europe/Paris" };
const $ = (s) => document.querySelector(s);

let state = { port: loadPort(), tides: [], hourly: [], daily: [], avis: [], lieu: null, selectedYmd: null, loading: false, error: null, stale: null };
let chart = null;        // paramètres géométriques de la courbe (pour le tick live)
let waterRange = null;   // {lo, hi} du jour, pour le niveau d'eau animé
let lastNextTs = null;   // timestamp de la prochaine marée connue (détection de bascule)

function loadPort() { try { return JSON.parse(localStorage.getItem("maree.port")) || DEFAULT_PORT; } catch { return DEFAULT_PORT; } }
function savePort(p) { localStorage.setItem("maree.port", JSON.stringify(p)); }

// ---- Jours & alertes (sélecteur de jour, risques météo)
function ymdOf(date, tz) { return date.toLocaleDateString("sv-SE", { timeZone: tz || "Europe/Paris" }); }
function todayYmd() { return ymdOf(new Date(), state.port.time_zone); }
function ribbonYmds() { return [...new Set(state.tides.map((x) => x.ymd))].sort(); }
function dayLabel(ymd) {
  if (ymd === todayYmd()) return "Auj.";
  if (ymd === ymdOf(new Date(Date.now() + 86400e3), state.port.time_zone)) return "Dem.";
  return cap(new Date(ymd + "T12:00:00").toLocaleDateString("fr-FR", { weekday: "short", day: "numeric" }).replace(".", ""));
}
function dayLabelLong(ymd) {
  if (ymd === todayYmd()) return "aujourd'hui";
  return new Date(ymd + "T12:00:00").toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" });
}
function riskForYmd(ymd) {
  let level = 0, gale = false, text = null, force = 0;
  const d = state.daily.find((x) => x.ymd === ymd);
  if (d && d.riskLevel > 0) { level = Math.max(level, d.riskLevel); text = d.riskText; }
  const a = state.avis.find((x) => x.ymd === ymd && x.niveau > 0);
  if (a) { gale = true; force = a.force; level = Math.max(level, 2); text = text || a.phrase; }
  return { level, gale, text, force };
}
function upcomingAlert() {
  const ty = todayYmd();
  for (const ymd of ribbonYmds()) {
    if (ymd < ty) continue;
    const r = riskForYmd(ymd);
    if (r.level > 0) return { ymd, ...r };
  }
  return null;
}
function daySummary(ymd) {
  const tz = state.port.time_zone;
  const hs = state.hourly.filter((h) => ymdOf(h.date, tz) === ymd);
  if (hs.length) {
    const teaus = hs.map((h) => h.teau).filter((v) => v != null);
    return {
      windMax: Math.max(...hs.map((h) => h.windKmh || 0)),
      gustMax: Math.max(...hs.map((h) => h.gustKmh || 0)),
      swellMax: Math.max(...hs.map((h) => h.swellH || 0)),
      teau: teaus.length ? Math.round(teaus.reduce((a, b) => a + b, 0) / teaus.length) : null,
      dir: hs[Math.floor(hs.length / 2)].windDir,
    };
  }
  const d = state.daily.find((x) => x.ymd === ymd);
  return d ? { windMax: d.windKmh, gustMax: d.gustKmh, swellMax: d.waveH || 0, teau: null, dir: d.windDir } : null;
}
function dayStrip(ymd) {
  const s = daySummary(ymd); if (!s) return "";
  const p = [];
  if (s.windMax != null) p.push(`💨 ${s.windMax}<small> km/h ${cardinal(s.dir)}</small>`);
  if (s.gustMax) p.push(`🌬 <small>raf.</small> ${s.gustMax}`);
  if (s.swellMax) p.push(`〰️ ${metres(s.swellMax)}<small> m</small>`);
  if (s.teau != null) p.push(`🌊 ${s.teau}°`);
  return `<div class="daystrip">${p.join('<span class="sep">·</span>')}</div>`;
}
function ribbonPill(ymd, sel) {
  const r = riskForYmd(ymd);
  const dot = r.gale ? `<span class="rk rk-red"></span>` : (r.level > 0 ? `<span class="rk rk-amber"></span>` : "");
  return `<button class="pill-day ${ymd === sel ? "sel" : ""}" data-ymd="${ymd}">${dayLabel(ymd)}${dot}</button>`;
}
function alertBanner(al) {
  const icon = al.gale ? "🌪" : "⚠︎";
  const label = al.gale ? "Avis de coup de vent" : (al.text || "Risque météo");
  const when = cap(dayLabelLong(al.ymd));
  return `<div class="alert ${al.gale ? "alert-red" : "alert-amber"}"><span class="ai">${icon}</span>
    <div><b>${label}</b><span>${when}${al.gale && al.force ? " · force " + al.force : ""}</span></div></div>`;
}
function wireRibbon() {
  document.querySelectorAll(".pill-day").forEach((b) => {
    b.onclick = () => {
      state.selectedYmd = b.dataset.ymd;
      renderAll(false);
      const el = document.querySelector(".pill-day.sel");
      if (el) el.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
    };
  });
}

// ---- Réseau
async function apiSearch(q) {
  const r = await fetch(`${API_BASE}/search?q=${encodeURIComponent(q)}`);
  if (!r.ok) throw new Error("http " + r.status);
  return ((await r.json()).contenu || []).filter((p) => p.presence_maree !== false);
}
async function apiTides(lat, lon) {
  const r = await fetch(`${API_BASE}/tides?lat=${lat}&lon=${lon}`);
  if (!r.ok) throw new Error("http " + r.status);
  const c = (await r.json()).contenu || {};
  const tides = [];
  for (const d of (c.marees || [])) for (const e of (d.etales || [])) {
    tides.push({ date: new Date(e.datetime), ymd: String(e.datetime).slice(0, 10),
      hhmm: String(e.datetime).slice(11, 16), type: e.type_etale, hauteur: e.hauteur, coef: e.coef });
  }
  tides.sort((a, b) => a.date - b.date);
  const hourly = ((c.previs || {}).detail || []).map((h) => ({
    date: new Date(h.datetime),
    teau: h.teau, tair: h.t, feels: h.temperessentie,
    windKmh: h.forcevkmh, gustKmh: h.rafvkmh, windDir: h.dirvdegres,
    waveH: h.hauteurvague, swellH: h.hauteurhoule, swellPer: h.periodehoule,
    pressure: h.pression, uv: h.uv, cloud: h.nuagecouverture,
  }));
  const daily = ((c.previs || {}).simple || []).map((s) => ({
    ymd: String(s.datetime).slice(0, 10),
    windKmh: s.forcevkmh, gustKmh: s.rafvkmh, windDir: s.dirvdegres, waveH: s.hauteurvague,
    riskLevel: (s.marinerisks && s.marinerisks.level) || 0,

  const avis = (c.avis || []).map((a) => ({
    ymd: String(a.datetime).slice(0, 10), niveau: a.niveau || 0, force: a.force_vent || 0, phrase: a.phrase || "",
  }));
  const lieu = (c.marees && c.marees[0] && c.marees[0].lieu) || null;
  return { tides, hourly, daily, avis, lieu };
}
function cleanLieu(s) { return String(s).split("©")[0].trim() || "Ma position"; }

// ---- Cache hors-ligne (dernière prévision par port)
function cacheKey() { return "maree.cache." + state.port.lat + "," + state.port.lon; }

// ---- Calculs
function surrounding(now, t) { let prev = null, next = null; for (const x of t) { if (x.date <= now) prev = x; else { next = x; break; } } return { prev, next }; }
function heightNow(now, t) {
  const { prev, next } = surrounding(now, t); if (!prev || !next) return null;
  const span = next.date - prev.date; if (span <= 0) return prev.hauteur;
  const k = (now - prev.date) / span;
  return prev.hauteur + (next.hauteur - prev.hauteur) * (1 - Math.cos(Math.PI * k)) / 2;
}
function coefNow(now, t) {
  const { next } = surrounding(now, t);
  if (next && next.type === "PM" && next.coef != null) return next.coef;
  const highs = t.filter((x) => x.type === "PM" && x.coef != null);
  if (!highs.length) return null;
  highs.sort((a, b) => Math.abs(a.date - now) - Math.abs(b.date - now));
  return highs[0].coef;
}
const isHigh = (x) => x.type === "PM";
const metres = (h) => h == null ? "—" : h.toFixed(2).replace(".", ",");
function dur(ms) { const s = Math.max(0, ms/1000|0), h = s/3600|0, m = (s%3600)/60|0, sec = s%60;
  return h ? `${h} h ${String(m).padStart(2,"0")}` : m ? `${m} min ${String(sec).padStart(2,"0")}` : `${sec} s`; }
function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function dayName(d) { return d.toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"short" }); }
const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);

// Régime de marée d'après le coefficient (conventions FR)
function regime(coef) {
  if (coef == null) return "";
  if (coef >= 100) return "Grandes marées";
  if (coef >= 95) return "Vives-eaux";
  if (coef >= 70) return "Vives-eaux";
  if (coef >= 45) return "Marées moyennes";
  return "Mortes-eaux";
}
// Phase de lune approximée → emoji (les grandes marées coïncident avec pleine/nouvelle lune)
function moonEmoji(date) {
  const synodic = 29.530588853, ref = Date.UTC(2000, 0, 6, 18, 14);
  let frac = (((date - ref) / 86400000) % synodic) / synodic; if (frac < 0) frac += 1;
  return ["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"][Math.floor(frac * 8 + 0.5) % 8];
}

// Météo marine : entrée horaire la plus proche de maintenant
function weatherNow() {
  if (!state.hourly || !state.hourly.length) return null;
  const now = Date.now();
  return state.hourly.reduce((a, b) => Math.abs(b.date - now) < Math.abs(a.date - now) ? b : a);
}
// Rose des vents (direction d'où vient le vent)
function cardinal(deg) {
  if (deg == null) return "";
  return ["N","NE","E","SE","S","SO","O","NO"][Math.round(deg / 45) % 8];
}

// Lever / coucher du soleil (algorithme SunCalc, précis à ~1 min)
const SUN = (() => {
  const rad = Math.PI/180, dayMs = 86400e3, J1970 = 2440588, J2000 = 2451545, e = rad*23.4397;
  const toDays = (d) => d.valueOf()/dayMs - 0.5 + J1970 - J2000;
  const fromJ = (j) => new Date((j + 0.5 - J1970) * dayMs);
  const M = (d) => rad*(357.5291 + 0.98560028*d);
  const L = (m) => m + rad*(1.9148*Math.sin(m) + 0.02*Math.sin(2*m) + 0.0003*Math.sin(3*m)) + rad*102.9372 + Math.PI;
  const dec = (l) => Math.asin(Math.sin(e)*Math.sin(l));
  const J0 = 0.0009;
  const transitJ = (ds, m, l) => J2000 + ds + 0.0053*Math.sin(m) - 0.0069*Math.sin(2*l);
  return (date, lat, lng) => {
    const lw = rad*-lng, phi = rad*lat, d = toDays(date);
    const n = Math.round(d - J0 + lw/(2*Math.PI));
    const ds = J0 - lw/(2*Math.PI) + n;
    const m = M(ds), l = L(m), de = dec(l), Jnoon = transitJ(ds, m, l);
    const w = Math.acos((Math.sin(rad*-0.833) - Math.sin(phi)*Math.sin(de)) / (Math.cos(phi)*Math.cos(de)));
    const Jset = transitJ(J0 + (w - lw)/(2*Math.PI) + n, m, l);
    return { sunrise: fromJ(Jnoon - (Jset - Jnoon)), sunset: fromJ(Jset) };
  };
})();

// ---- Icônes
function arrow(up, cls) {
  const c = up ? "var(--high)" : "var(--low)";
  const path = up ? "M12 19V5M6 11l6-6 6 6" : "M12 5v14M6 13l6 6 6-6";
  return `<svg class="${cls||''}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="${path}"/></svg>`;
}

// ---- Vague (chemin sinusoïdal seamless, 2 longueurs d'onde sur 240)
function wavePath(w = 240, h = 16, amp = 3.2) {
  const base = amp + 1; let d = `M0 ${h}`;
  for (let x = 0; x <= w; x += 4) { const y = base + amp * Math.sin((x / 120) * 2 * Math.PI); d += ` L${x} ${y.toFixed(2)}`; }
  return d + ` L${w} ${h} L0 ${h} Z`;
}

// ---- Carte météo marine
function tile(icon, val, unit, label) {
  if (val == null || val === "") return "";
  return `<div class="tile"><div class="ti">${icon}</div>
    <div class="tv">${val}<small>${unit||""}</small></div><div class="tl">${label}</div></div>`;
}
function weatherCard(cls) {
  const w = weatherNow();

    ? `${w.windKmh}<small> km/h ${cardinal(w.windDir)}</small>` : null;
  const gust = w.gustKmh != null ? `raf. ${w.gustKmh} km/h` : "";
  const swell = (w.swellH != null)
    ? `${metres(w.swellH)}<small> m${w.swellPer ? " · " + w.swellPer + " s" : ""}</small>` : null;
  const tiles = [

  return `<section class="card ${cls}"><h2>Météo marine</h2><div class="tiles">${tiles}</div></section>`;
}

// ---- Fenêtres d'activité (« quand y aller »)
function heureTZ(date, tz) {
  return date.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit", timeZone: tz || "Europe/Paris" });
}
function rangeAround(date, halfMin, tz) {
  const a = new Date(date.getTime() - halfMin*60e3), b = new Date(date.getTime() + halfMin*60e3);
  return `${heureTZ(a, tz)} – ${heureTZ(b, tz)}`;
}
function activityWindows(now) {
  const t = state.tides; if (!t.length) return [];
  const tz = state.port.time_zone || "Europe/Paris";
  const w = weatherNow();
  const out = [];

  // Pêche à pied — autour de la prochaine basse mer, qualité selon le coefficient
  const bm = t.find((x) => x.date > now && x.type === "BM");
  if (bm) {
    const coef = coefNow(bm.date, t);
    const q = coef == null ? { t: "—", c: "q1" }
      : coef >= 110 ? { t: "Exceptionnel", c: "q4" } : coef >= 100 ? { t: "Idéal", c: "q4" }
      : coef >= 85 ? { t: "Très bon", c: "q3" } : coef >= 70 ? { t: "Bon", c: "q3" }
      : coef >= 45 ? { t: "Moyen", c: "q2" } : { t: "Faible", c: "q1" };
    out.push({ icon: "🦪", name: "Pêche à pied", sub: `basse mer ${bm.hhmm} · ${rangeAround(bm.date, 90, tz)}`,
      badge: coef != null ? `${q.t} · coef ${coef}` : q.t, bc: q.c });
  }
  // Baignade / mise à l'eau — autour de la prochaine pleine mer, avec la température de l'eau
  const pm = t.find((x) => x.date > now && x.type === "PM");
  if (pm) {
    const te = w && w.teau;
    const q = te == null ? { t: "Bonne fenêtre", c: "q3" }
      : te >= 20 ? { t: `Eau ${te}° · agréable`, c: "q4" } : te >= 16 ? { t: `Eau ${te}° · correcte`, c: "q3" }
      : { t: `Eau ${te}° · fraîche`, c: "q2" };
    out.push({ icon: "🏊", name: "Baignade / mise à l'eau", sub: `pleine mer ${pm.hhmm} · ${rangeAround(pm.date, 120, tz)}`,
      badge: q.t, bc: q.c });
  }
  // Paddle / kayak — à la prochaine étale, qualité selon le vent
  const et = t.find((x) => x.date > now);
  if (et && w && w.windKmh != null) {
    const v = w.windKmh, card = cardinal(w.windDir);
    const q = v < 12 ? { t: `Vent ${v} km/h ${card} · idéal`, c: "q4" } : v < 20 ? { t: `Vent ${v} km/h ${card} · favorable`, c: "q3" }
      : v < 30 ? { t: `Vent ${v} km/h ${card} · soutenu`, c: "q2" } : { t: `Vent ${v} km/h ${card} · déconseillé`, c: "q1" };
    out.push({ icon: "🛶", name: "Paddle / kayak", sub: `étale ${et.hhmm} · ${rangeAround(et.date, 60, tz)}`,
      badge: q.t, bc: q.c });
  }
  return out;
}
function activityCard(cls) {
  const acts = activityWindows(new Date());
  if (!acts.length) return "";
  return `<section class="card ${cls}"><h2>Bon moment pour…</h2>
    ${acts.map((a) => `<div class="act">
      <div class="aico">${a.icon}</div>

      <div class="abadge ${a.bc}">${a.badge}</div></div>`).join("")}</section>`;
}

function rowHTML(x, now) {

    <span class="t">${x.hhmm}</span></div>`;
}

// ---- Courbe SVG
function chartSVG(ymd, animate) {
  const t = state.tides;
  const tz = state.port.time_zone || "Europe/Paris";
  const dayT = t.filter((x) => x.ymd === ymd).sort((a, b) => a.date - b.date);
  if (dayT.length < 1) return "";
  const W = 600, H = 210, padL = 4, padR = 4, padT = 26, padB = 24;
  const start = new Date(dayT[0].date.getTime() - 3*3600e3), end = new Date(dayT[dayT.length-1].date.getTime() + 3*3600e3);
  const now = new Date();
  const isToday = ymd === todayYmd() && now >= start && now <= end;
  const pts = [];
  for (let ms = start.getTime(); ms <= end.getTime(); ms += 600e3) { const hv = heightNow(new Date(ms), t); if (hv != null) pts.push([ms, hv]); }
  if (pts.length < 2) return "";
  const inWin = t.filter((x) => x.date >= start && x.date <= end);
  const hs = pts.map((p)=>p[1]).concat(inWin.map((x)=>x.hauteur));
  let lo = Math.min(...hs), hi = Math.max(...hs); const pad = (hi-lo)*0.15 || 1; lo -= pad; hi += pad;
  const X = (ms) => padL + (ms - start) / (end - start) * (W - padL - padR);
  const Y = (h) => padT + (1 - (h - lo)/(hi - lo)) * (H - padT - padB);
  chart = { startMs: start.getTime(), endMs: end.getTime(), lo, hi, W, H, padL, padR, padT, padB };

  // Ombrage jour/nuit + repères lever/coucher du soleil
  let nights = "", sunMk = "", dayMs = 86400e3, top = padT - 8, hgt = H - padB - top;
  for (let t0 = start.getTime() - dayMs; t0 <= end.getTime() + dayMs; t0 += dayMs) {
    const s1 = SUN(new Date(t0), state.port.lat, state.port.lon);
    const s2 = SUN(new Date(t0 + dayMs), state.port.lat, state.port.lon);
    const a0 = Math.max(s1.sunset.getTime(), start.getTime()), b0 = Math.min(s2.sunrise.getTime(), end.getTime());
    if (b0 > a0) nights += `<rect x="${X(a0).toFixed(1)}" y="${top}" width="${(X(b0)-X(a0)).toFixed(1)}" height="${hgt.toFixed(1)}" fill="rgba(2,8,26,.28)"/>`;
    for (const [d, gl] of [[s1.sunrise, "☀"], [s1.sunset, "🌙"]]) {
      const ms = d.getTime();
      if (ms >= start.getTime() && ms <= end.getTime())
        sunMk += `<text x="${X(ms).toFixed(1)}" y="${(padT-11).toFixed(1)}" font-size="11" text-anchor="middle">${gl}</text>`;
    }
  }

  const line = pts.map((p,i)=>`${i?'L':'M'}${X(p[0]).toFixed(1)} ${Y(p[1]).toFixed(1)}`).join(" ");
  const area = `${line} L${X(pts[pts.length-1][0]).toFixed(1)} ${H-padB} L${X(pts[0][0]).toFixed(1)} ${H-padB} Z`;
  const nx = X(now.getTime()), ny = Y(heightNow(now, t) ?? lo);
  const drawCls = animate ? "draw" : "", areaCls = animate ? "fadein" : "";

  const dots = inWin.map((x)=>{
    const cx = X(x.date.getTime()), cy = Y(x.hauteur), above = isHigh(x);
    return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3.2" fill="#fff"/>
      <text x="${cx.toFixed(1)}" y="${(above?cy-8:cy+16).toFixed(1)}" fill="rgba(255,255,255,.9)" font-size="11" font-weight="700" text-anchor="middle">${x.hhmm}</text>`;
  }).join("");
  const ticks = [];
  const d0 = new Date(start); d0.setMinutes(0,0,0);
  for (let ms = d0.getTime(); ms <= end.getTime(); ms += 3*3600e3) {
    if (ms < start.getTime()) continue;
    const hh = new Date(ms).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:tz});
    ticks.push(`<text x="${X(ms).toFixed(1)}" y="${H-6}" fill="rgba(255,255,255,.55)" font-size="10" text-anchor="middle">${hh}</text>`);
  }
  const nowMk = isToday ? `
    <line id="nowLine" x1="${nx.toFixed(1)}" y1="${padT-8}" x2="${nx.toFixed(1)}" y2="${H-padB}" stroke="rgba(255,255,255,.55)" stroke-width="1.4" stroke-dasharray="4 4"/>
    <circle id="nowPulse" cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="5" fill="#8fe3ff"/>
    <circle id="nowDot" cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="5" fill="#fff"/>` : "";
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#66d9ff" stop-opacity=".55"/><stop offset="1" stop-color="#0a6ab0" stop-opacity="0"/></linearGradient></defs>
    ${nights}
    <path class="${areaCls}" d="${area}" fill="url(#fill)"/>
    <path class="${drawCls}" d="${line}" pathLength="1" fill="none" stroke="#8fe3ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    ${nowMk}
    ${dots}${ticks.join("")}${sunMk}
    <line id="scrubLine" x1="0" y1="${(padT-8).toFixed(1)}" x2="0" y2="${(H-padB).toFixed(1)}" stroke="#fff" stroke-width="1.4" style="display:none"/>
    <circle id="scrubDot" cx="0" cy="0" r="5.5" fill="#fff" stroke="#0a6ab0" stroke-width="2" style="display:none"/></svg>`;
}

// ---- Scrub tactile sur la courbe (comme l'app Météo d'Apple)
function wireChart() {
  const host = document.getElementById("chartHost");
  if (!host || !chart) return;
  const svg = host.querySelector("svg.chart");
  const tip = host.querySelector("#scrubTip");
  const line = svg.querySelector("#scrubLine"), dot = svg.querySelector("#scrubDot");
  const Y = (h) => chart.padT + (1 - (h - chart.lo)/(chart.hi - chart.lo)) * (chart.H - chart.padT - chart.padB);
  let active = false;

  const show = (clientX) => {
    const r = svg.getBoundingClientRect();
    const px = Math.min(r.width, Math.max(0, clientX - r.left));
    const vbX = px / r.width * chart.W;
    const frac = Math.min(1, Math.max(0, (vbX - chart.padL) / (chart.W - chart.padL - chart.padR)));
    const ms = chart.startMs + frac * (chart.endMs - chart.startMs);
    const d = new Date(ms), h = heightNow(d, state.tides);
    line.setAttribute("x1", vbX.toFixed(1)); line.setAttribute("x2", vbX.toFixed(1));
    line.style.display = "";
    if (h != null) { dot.setAttribute("cx", vbX.toFixed(1)); dot.setAttribute("cy", Y(h).toFixed(1)); dot.style.display = ""; }
    tip.innerHTML = `<b>${heureTZ(d, state.port.time_zone)}</b>${h != null ? " · " + metres(h) + " m" : ""}`;
    tip.style.display = "block";
    tip.style.left = Math.min(r.width - 6, Math.max(6, px)) + "px";
  };
  const end = () => { active = false; line.style.display = "none"; dot.style.display = "none"; tip.style.display = "none"; };

  host.onpointerdown = (e) => { active = true; show(e.clientX); };
  host.onpointermove = (e) => { if (active) show(e.clientX); };
  host.onpointerup = end; host.onpointercancel = end; host.onpointerleave = end;
}

// ---- Image à partager (canvas 1080×1350, épurée)
function buildShareCanvas() {
  const S = 3, W = 360*S, H = 450*S, m = 30*S;
  const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
  const g = cv.getContext("2d");
  const fam = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
  const bg = g.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, "#0b6fb4"); bg.addColorStop(1, "#04264c");
  g.fillStyle = bg; g.fillRect(0, 0, W, H);
  const glow = g.createRadialGradient(W*0.5, -H*0.1, 0, W*0.5, -H*0.1, H*0.65);
  glow.addColorStop(0, "rgba(102,217,255,.22)"); glow.addColorStop(1, "rgba(102,217,255,0)");
  g.fillStyle = glow; g.fillRect(0, 0, W, H);

  const now = new Date();
  g.textBaseline = "alphabetic"; g.textAlign = "left";
  g.fillStyle = "#fff"; g.font = `800 ${29*S}px ${fam}`;
  g.fillText(state.port.nom, m, 58*S);
  g.fillStyle = "rgba(255,255,255,.7)"; g.font = `500 ${15*S}px ${fam}`;
  g.fillText(cap(now.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" })), m, 84*S);

  // Courbe pleine journée
  const cx0 = m, cx1 = W - m, cy0 = 122*S, cy1 = 250*S;
  const today = state.tides.filter((x) => sameDay(x.date, now));
  const base = today.length ? today[0].date : now;
  const dayStart = new Date(base); dayStart.setHours(0, 0, 0, 0);
  const dayEnd = new Date(dayStart.getTime() + 24*3600e3);
  const pts = [];
  for (let ms = dayStart.getTime(); ms <= dayEnd.getTime(); ms += 15*60e3) {
    const h = heightNow(new Date(ms), state.tides); if (h != null) pts.push([ms, h]);
  }
  if (pts.length > 1) {
    const hs = pts.map((p) => p[1]); let lo = Math.min(...hs), hi = Math.max(...hs);
    const pd = (hi - lo)*0.2 || 1; lo -= pd; hi += pd;
    const X = (ms) => cx0 + (ms - dayStart) / (dayEnd - dayStart) * (cx1 - cx0);
    const Y = (h) => cy0 + (1 - (h - lo)/(hi - lo)) * (cy1 - cy0);
    g.beginPath(); g.moveTo(X(pts[0][0]), Y(pts[0][1]));
    for (const p of pts) g.lineTo(X(p[0]), Y(p[1]));
    g.lineTo(X(pts[pts.length-1][0]), cy1); g.lineTo(X(pts[0][0]), cy1); g.closePath();
    const ag = g.createLinearGradient(0, cy0, 0, cy1);
    ag.addColorStop(0, "rgba(143,227,255,.42)"); ag.addColorStop(1, "rgba(143,227,255,0)");
    g.fillStyle = ag; g.fill();
    g.beginPath(); g.moveTo(X(pts[0][0]), Y(pts[0][1]));
    for (const p of pts) g.lineTo(X(p[0]), Y(p[1]));
    g.strokeStyle = "#bfeeff"; g.lineWidth = 3*S; g.lineJoin = "round"; g.lineCap = "round"; g.stroke();
    g.textAlign = "center";
    for (const x of today) {
      const px = X(x.date.getTime()), py = Y(x.hauteur), up = isHigh(x);
      g.fillStyle = "#fff"; g.beginPath(); g.arc(px, py, 4*S, 0, 7); g.fill();
      g.font = `700 ${13*S}px ${fam}`; g.fillStyle = "#fff"; g.fillText(x.hhmm, px, up ? py-13*S : py+23*S);
      g.font = `500 ${11*S}px ${fam}`; g.fillStyle = "rgba(255,255,255,.72)"; g.fillText(metres(x.hauteur)+" m", px, up ? py-30*S : py+39*S);
    }
  }

  // Coefficient (gauche) + prochaine marée (droite)
  const by = 326*S, coef = coefNow(now, state.tides);
  if (coef != null) {
    g.textAlign = "left"; g.fillStyle = "rgba(255,255,255,.55)"; g.font = `700 ${12*S}px ${fam}`;
    g.fillText("COEFFICIENT", m, by);
    g.fillStyle = "#fff"; g.font = `800 ${50*S}px ${fam}`; g.fillText(String(coef), m, by + 48*S);
    g.fillStyle = "rgba(255,255,255,.8)"; g.font = `600 ${15*S}px ${fam}`; g.fillText(regime(coef), m, by + 74*S);
  }
  const nx = state.tides.find((x) => x.date > now);
  if (nx) {
    g.textAlign = "right"; g.fillStyle = "rgba(255,255,255,.55)"; g.font = `700 ${12*S}px ${fam}`;
    g.fillText(isHigh(nx) ? "PROCHAINE PLEINE MER" : "PROCHAINE BASSE MER", W - m, by);
    g.fillStyle = "#fff"; g.font = `800 ${40*S}px ${fam}`; g.fillText(nx.hhmm, W - m, by + 44*S);
    g.fillStyle = "rgba(255,255,255,.8)"; g.font = `600 ${15*S}px ${fam}`; g.fillText(metres(nx.hauteur) + " m", W - m, by + 74*S);
  }

  g.textAlign = "center"; g.fillStyle = "rgba(255,255,255,.5)"; g.font = `600 ${13*S}px ${fam}`;
  g.fillText("MARÉES · MineDigital", W/2, H - 26*S);
  return cv;
}

async function share() {
  const btn = document.getElementById("shareBtn");
  const canvas = buildShareCanvas();
  canvas.toBlob(async (blob) => {
    if (!blob) return;
    const file = new File([blob], "marees.png", { type: "image/png" });
    const data = { files: [file], title: "Marées", text: `${state.port.nom} — marées du jour` };
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share(data); } catch {}
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = "marees.png"; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }
  }, "image/png");
}

// ---- Tick live (chaque seconde) : compte à rebours, niveau d'eau, marqueur
function tickLive() {
  const t = state.tides; if (!t.length) return;
  const now = new Date();
  const h = heightNow(now, t);
  const { prev, next } = surrounding(now, t);

  const hv = $("#heightVal"); if (hv && h != null) hv.textContent = metres(h);
  const trend = $("#trendTxt"); if (trend && next) trend.textContent = isHigh(next) ? "Marée montante" : "Marée descendante";

  // Niveau d'eau animé dans la carte héro
  const water = $("#water");
  if (water && waterRange && h != null) {
    const lvl = Math.max(4, Math.min(100, (h - waterRange.lo) / ((waterRange.hi - waterRange.lo) || 1) * 100));
    water.style.height = lvl + "%";
  }

  // Barre de progression entre deux marées
  if (prev && next) {
    const frac = Math.min(1, Math.max(0, (now - prev.date) / (next.date - prev.date)));
    const bar = $("#progBar"); if (bar) bar.style.width = (frac * 100).toFixed(1) + "%";
    const pf = $("#progFrom"), pt = $("#progTo");
    if (pf) pf.textContent = prev.hhmm; if (pt) pt.textContent = next.hhmm;
  }

  // Compte à rebours (à la seconde)
  const cd = $("#countdown"); if (cd && next) cd.textContent = "dans " + dur(next.date - now);

  // Bascule de marée franchie → on reconstruit (met à jour listes & prochaine)
  if (next && lastNextTs && +next.date !== lastNextTs) { renderAll(false); return; }

  // Déplacement du marqueur "maintenant" sur la courbe
  if (chart && now.getTime() >= chart.startMs && now.getTime() <= chart.endMs && h != null) {
    const X = (ms) => chart.padL + (ms - chart.startMs) / (chart.endMs - chart.startMs) * (chart.W - chart.padL - chart.padR);
    const Y = (hh) => chart.padT + (1 - (hh - chart.lo)/(chart.hi - chart.lo)) * (chart.H - chart.padT - chart.padB);
    const nx = X(now.getTime()).toFixed(1), ny = Y(h).toFixed(1);
    const nl = $("#nowLine"), nd = $("#nowDot"), np = $("#nowPulse");
    if (nl) { nl.setAttribute("x1", nx); nl.setAttribute("x2", nx); }
    if (nd) { nd.setAttribute("cx", nx); nd.setAttribute("cy", ny); }
    if (np) { np.setAttribute("cx", nx); np.setAttribute("cy", ny); }
  }
}

// ---- Chargement
async function load() {
  const first = !state.tides.length;
  state.loading = true; state.error = null;
  if (first) renderSkeleton(); else $("#headSpin").innerHTML = '<div class="spinner"></div>';
  try {
    const res = await apiTides(state.port.lat, state.port.lon);
    state.tides = res.tides; state.hourly = res.hourly; state.daily = res.daily; state.avis = res.avis; state.lieu = res.lieu; state.stale = null;
    if (!res.tides.length) state.error = "Aucune donnée de marée pour ce port.";
    else { if (state.port.geo && res.lieu) { state.port.nom = cleanLieu(res.lieu); savePort(state.port); } saveCache(); }
  } catch {
    const cached = loadCache();
    if (cached && cached.tides.length) {
      state.tides = cached.tides; state.hourly = cached.hourly; state.daily = cached.daily; state.avis = cached.avis; state.lieu = cached.lieu; state.stale = cached.at;
    } else {
      state.error = "Impossible de charger les marées. Vérifie ta connexion.";
    }
  }
  state.loading = false; $("#headSpin").innerHTML = "";
  renderAll(true);
}

// ---- Recherche
let searchTimer = null;
$("#portBtn").onclick = () => { $("#sheetBg").classList.add("open"); setTimeout(()=>$("#searchIn").focus(), 50); };
$("#sheetBg").onclick = (e) => { if (e.target === $("#sheetBg")) close(); };
function close() { $("#sheetBg").classList.remove("open"); }

const geoBtn = $("#geoBtn");
function resetGeoBtn() { geoBtn.innerHTML = geoBtnLabel; }
const geoBtnLabel = geoBtn.innerHTML;
geoBtn.onclick = () => {
  if (!navigator.geolocation) { geoBtn.textContent = "Géolocalisation non disponible"; return; }
  geoBtn.textContent = "Localisation…";
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.port = { nom: "Ma position", lat: +pos.coords.latitude.toFixed(4), lon: +pos.coords.longitude.toFixed(4), geo: true };
      savePort(state.port); resetGeoBtn(); close();
      state.tides = []; state.hourly = []; load();
    },
    () => { geoBtn.textContent = "Position indisponible"; setTimeout(resetGeoBtn, 2200); },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
  );
};
$("#searchIn").oninput = (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) { $("#results").innerHTML = ""; return; }
  searchTimer = setTimeout(async () => {
    $("#results").innerHTML = '<div style="padding:14px;color:var(--faint)">Recherche…</div>';
    try {
      const list = await apiSearch(q);
      $("#results").innerHTML = list.map((p, i) =>
        `<button class="result" data-i="${i}">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--high)" stroke-width="2" style="width:20px;height:20px;flex:0 0 20px"><path d="M2 8.8a15 15 0 0 1 20 0M5 12.5a10 10 0 0 1 14 0M8.5 16a5 5 0 0 1 7 0"/></svg>
          <span>${p.nom}<small>${p.lat.toFixed(3)}, ${p.lon.toFixed(3)}</small></span></button>`
      ).join("") || '<div style="padding:14px;color:var(--faint)">Aucun port trouvé.</div>';
      document.querySelectorAll(".result").forEach((btn) => {
        btn.onclick = () => {
          const p = list[+btn.dataset.i];
          state.port = { id: p.id, nom: p.nom, lat: p.lat, lon: p.lon, time_zone: p.time_zone };
          savePort(state.port); close(); $("#searchIn").value = ""; $("#results").innerHTML = "";
          state.tides = []; load();
        };
      });
    } catch { $("#results").innerHTML = '<div style="padding:14px;color:var(--faint)">Recherche impossible.</div>'; }
  }, 350);
};

// ---- Cycle de vie
$("#shareBtn").onclick = share;
load();
setInterval(tickLive, 1000);                 // mises à jour live à la seconde
setInterval(() => renderAll(false), 15*60e3); // reslide la fenêtre de la courbe
setInterval(() => { if (!document.hidden) load(); }, 30*60e3); // rafraîchit les données
document.addEventListener("visibilitychange", () => { if (!document.hidden) load(); });
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
