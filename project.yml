name: Maree
options:
  bundleIdPrefix: com.thibautmine.appmaree
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    # ⬇️ Renseignez votre Team ID Apple Developer (Xcode > Settings > Accounts),
    #    ou laissez vide et sélectionnez l'équipe dans l'onglet Signing & Capabilities.
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Maree:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thibautmine.appmaree
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/App/App.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: MareeWidgetExtension

  MareeWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widget
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thibautmine.appmaree.widget
        INFOPLIST_FILE: Sources/Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Widget/Widget.entitlements
        GENERATE_INFOPLIST_FILE: NO
